# .github/workflows/release.yml
name: Release (PyPI + GitHub + Zenodo)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*

      - name: Publish PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m twine upload dist/*

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Zenodo (new version under existing concept)
        shell: bash
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_API_TOKEN }}
          ZENODO_DEP_ID: ${{ secrets.ZENODO_DEPOSITION_ID }} # deposit/deposition id
          ZENODO_SANDBOX: "false"
        run: |
          set -euo pipefail
          API="https://zenodo.org/api"; [[ "${ZENODO_SANDBOX}" == "true" ]] && API="https://sandbox.zenodo.org/api"

          VERSION="${GITHUB_REF#refs/tags/v}"
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" .zenodo.json

          curl -fsS -H "Authorization: Bearer $ZENODO_TOKEN" "$API/deposit/depositions/$ZENODO_DEP_ID" >/dev/null

          curl -fsS -X POST "$API/deposit/depositions/$ZENODO_DEP_ID/actions/newversion" \
            -H "Authorization: Bearer $ZENODO_TOKEN" -H "Content-Type: application/json" -d '{}' > nv.json

          DRAFT_URL=$(python -c 'import json; print(json.load(open("nv.json"))["links"]["latest_draft"])')
          curl -fsS -H "Authorization: Bearer $ZENODO_TOKEN" "$DRAFT_URL" > dep.json
          DEP_ID=$(python -c 'import json; print(json.load(open("dep.json"))["id"])')
          BUCKET=$(python -c 'import json; print(json.load(open("dep.json"))["links"]["bucket"])')

          # update metadata
          curl -fsS -X PUT "$API/deposit/depositions/$DEP_ID" \
            -H "Authorization: Bearer $ZENODO_TOKEN" -H "Content-Type: application/json" \
            -d @.zenodo.json >/dev/null

          # delete carried-over files
          curl -fsS -H "Authorization: Bearer $ZENODO_TOKEN" "$API/deposit/depositions/$DEP_ID" | \
            python -c 'import json,sys; [print(f["id"]) for f in json.load(sys.stdin).get("files",[])]' | \
            while read -r fid; do
              [[ -z "$fid" ]] && continue
              curl -fsS -X DELETE "$API/deposit/depositions/$DEP_ID/files/$fid" \
                -H "Authorization: Bearer $ZENODO_TOKEN" >/dev/null
            done

          # upload dist/*
          shopt -s nullglob; files=(dist/*); [[ ${#files[@]} -gt 0 ]] || { echo "No dist/*"; exit 1; }
          for f in "${files[@]}"; do
            curl -fsS -X PUT "$BUCKET/$(basename "$f")" -H "Authorization: Bearer $ZENODO_TOKEN" \
              --upload-file "$f" >/dev/null
          done

          curl -fsS -X POST "$API/deposit/depositions/$DEP_ID/actions/publish" \
            -H "Authorization: Bearer $ZENODO_TOKEN" >/dev/null
