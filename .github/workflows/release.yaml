# .github/workflows/release.yml
name: Release (PyPI + GitHub + Zenodo)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*

      - name: Publish PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m twine upload dist/*

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Zenodo (new version under existing concept DOI)
        shell: bash
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_API_TOKEN }}
          ZENODO_DEP_ID: ${{ secrets.ZENODO_DEPOSITION_ID }} # must be deposit/deposition id (e.g. 18628331)
          ZENODO_SANDBOX: "false"
        run: |
          set -euo pipefail
          [[ -n "${ZENODO_TOKEN:-}" ]] || { echo "ERROR: ZENODO_API_TOKEN missing/empty"; exit 2; }
          [[ -n "${ZENODO_DEP_ID:-}" ]] || { echo "ERROR: ZENODO_DEPOSITION_ID missing/empty"; exit 2; }

          API="https://zenodo.org/api"
          [[ "${ZENODO_SANDBOX}" == "true" ]] && API="https://sandbox.zenodo.org/api"
          AUTH=(-H "Authorization: Bearer $ZENODO_TOKEN")

          VERSION="${GITHUB_REF#refs/tags/v}"
          [[ -f .zenodo.json ]] || { echo "ERROR: .zenodo.json not found"; exit 2; }
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" .zenodo.json

          # verify base deposition is accessible (fails early if ID/token wrong)
          curl -fsS "${AUTH[@]}" "$API/deposit/depositions/$ZENODO_DEP_ID" >/dev/null

          # create new version draft (keeps same concept DOI)
          curl -fsS -X POST "$API/deposit/depositions/$ZENODO_DEP_ID/actions/newversion" \
            "${AUTH[@]}" -H "Content-Type: application/json" -d '{}' > nv.json

          DRAFT_URL=$(python -c 'import json; print(json.load(open("nv.json"))["links"]["latest_draft"])')
          curl -fsS "${AUTH[@]}" "$DRAFT_URL" > dep.json
          DEP_ID=$(python -c 'import json; print(json.load(open("dep.json"))["id"])')
          BUCKET=$(python -c 'import json; print(json.load(open("dep.json"))["links"]["bucket"])')

          # update metadata
          curl -fsS -X PUT "$API/deposit/depositions/$DEP_ID" \
            "${AUTH[@]}" -H "Content-Type: application/json" -d @.zenodo.json >/dev/null

          # delete files carried over from previous version
          curl -fsS "${AUTH[@]}" "$API/deposit/depositions/$DEP_ID" | \
            python -c 'import json,sys; [print(f["id"]) for f in json.load(sys.stdin).get("files",[])]' | \
            while read -r fid; do
              [[ -z "$fid" ]] && continue
              curl -fsS -X DELETE "$API/deposit/depositions/$DEP_ID/files/$fid" "${AUTH[@]}" >/dev/null
            done

          # upload dist/*
          shopt -s nullglob
          files=(dist/*)
          [[ ${#files[@]} -gt 0 ]] || { echo "ERROR: No dist/* to upload"; exit 2; }
          for f in "${files[@]}"; do
            curl -fsS -X PUT "$BUCKET/$(basename "$f")" "${AUTH[@]}" --upload-file "$f" >/dev/null
          done

          # publish (mints new version DOI under same concept DOI)
          curl -fsS -X POST "$API/deposit/depositions/$DEP_ID/actions/publish" "${AUTH[@]}" >/dev/null
          echo "Zenodo: published version $VERSION under existing concept record."
