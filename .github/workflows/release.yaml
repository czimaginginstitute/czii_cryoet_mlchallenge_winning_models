# .github/workflows/release.yml
name: Release (PyPI + GitHub Release + Zenodo)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12" 

      - name: Build & validate
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m twine upload dist/*

      - name: Create GitHub Release (attach dist/*)
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Zenodo (New Version)
        shell: bash
        env:
          ZENODO_ACCESS_TOKEN: ${{ secrets.ZENODO_API_TOKEN }}
          EXISTING_DEP_ID: ${{ secrets.ZENODO_DEPOSITION_ID }}
          ZENODO_SANDBOX: "false" 
        run: |
          set -euo pipefail

          API="https://zenodo.org"
          if [[ "${ZENODO_SANDBOX}" == "true" ]]; then
            API="https://sandbox.zenodo.org"
          fi

          # 1. Update version in .zenodo.json to match the Git tag (removes 'v' prefix)
          VERSION=${GITHUB_REF#refs/tags/v}
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" .zenodo.json

          # 2. Request a new version draft
          curl -fsS -X POST "$API/deposit/depositions/$EXISTING_DEP_ID/actions/newversion" \
            -H "Authorization: Bearer $ZENODO_ACCESS_TOKEN" > new_version.json

          # 3. Get the new draft URL and its specific bucket
          NEW_DEP_URL=$(python -c 'import json; print(json.load(open("new_version.json"))["links"]["latest_draft"])')
          
          curl -fsS -H "Authorization: Bearer $ZENODO_ACCESS_TOKEN" "$NEW_DEP_URL" > deposition.json
          
          DEP_ID=$(python -c 'import json; print(json.load(open("deposition.json"))["id"])')
          BUCKET=$(python -c 'import json; print(json.load(open("deposition.json"))["links"]["bucket"])')
          
          echo "Targeting Deposition ID: $DEP_ID"

          # 4. Upload fresh metadata
          curl -fsS -X PUT "$API/deposit/depositions/$DEP_ID" \
            -H "Authorization: Bearer $ZENODO_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d @.zenodo.json >/dev/null

          # 5. Clear old files if any (Newversion carries over files from previous)
          # Fetch files currently in the draft
          curl -fsS -H "Authorization: Bearer $ZENODO_ACCESS_TOKEN" "$API/deposit/depositions/$DEP_ID" | \
          python -c 'import json, sys; [print(f["id"]) for f in json.load(sys.stdin)["files"]]' > old_files.txt
          
          while read file_id; do
            curl -fsS -X DELETE "$API/deposit/depositions/$DEP_ID/files/$file_id" \
              -H "Authorization: Bearer $ZENODO_ACCESS_TOKEN"
          done < old_files.txt

          # 6. Upload new artifacts
          shopt -s nullglob
          files=(dist/*)
          for f in "${files[@]}"; do
            echo "Uploading $(basename "$f")"
            curl -fsS -X PUT "$BUCKET/$(basename "$f")" \
              -H "Authorization: Bearer $ZENODO_ACCESS_TOKEN" \
              --upload-file "$f" >/dev/null
          done

          # 7. Finalize and Publish
          curl -fsS -X POST "$API/deposit/depositions/$DEP_ID/actions/publish" \
            -H "Authorization: Bearer $ZENODO_ACCESS_TOKEN" >/dev/null
          
          echo "Successfully published version $VERSION to Zenodo."