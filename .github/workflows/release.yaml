# .github/workflows/release.yml
name: Release (PyPI + GitHub Release + Zenodo versioned)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build & validate
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m twine upload dist/*

      - name: Create GitHub Release (attach dist/*)
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Zenodo (new version under existing Concept DOI)
        shell: bash
        env:
          ZENODO_ACCESS_TOKEN: ${{ secrets.ZENODO_API_TOKEN }}
          ZENODO_DEPOSITION_ID: ${{ secrets.ZENODO_DEPOSITION_ID }}
          ZENODO_SANDBOX: "false" # set to "true" to use sandbox.zenodo.org
        run: |
          set -euo pipefail

          API="https://zenodo.org/api"
          if [[ "${ZENODO_SANDBOX}" == "true" ]]; then
            API="https://sandbox.zenodo.org/api"
          fi

          # sanity checks
          if [[ -z "${ZENODO_ACCESS_TOKEN:-}" ]]; then
            echo "ERROR: ZENODO_API_TOKEN secret is missing"
            exit 1
          fi
          if [[ -z "${ZENODO_DEPOSITION_ID:-}" ]]; then
            echo "ERROR: ZENODO_DEPOSITION_ID secret is missing (base deposition to version)"
            exit 1
          fi
          if [[ ! -f .zenodo.json ]]; then
            echo "ERROR: .zenodo.json not found at repo root"
            exit 1
          fi

          echo "Creating new Zenodo version from base deposition: ${ZENODO_DEPOSITION_ID}"

          # Create a new version draft from the existing deposition (keeps same Concept DOI)
          curl -fsS -X POST "$API/deposit/depositions/$ZENODO_DEPOSITION_ID/actions/newversion" \
            -H "Authorization: Bearer $ZENODO_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{}' > newversion.json

          # Get the draft URL and fetch full deposition JSON to obtain id + bucket
          LATEST_DRAFT_URL=$(python -c 'import json; print(json.load(open("newversion.json"))["links"]["latest_draft"])')

          curl -fsS -X GET "$LATEST_DRAFT_URL" \
            -H "Authorization: Bearer $ZENODO_ACCESS_TOKEN" > deposition.json

          DEP_ID=$(python -c 'import json; print(json.load(open("deposition.json"))["id"])')
          BUCKET=$(python -c 'import json; print(json.load(open("deposition.json"))["links"]["bucket"])')
          echo "Zenodo draft deposition id: $DEP_ID"

          # OPTIONAL: remove files copied from previous version to avoid duplicates
          python - <<'PY'
          import json, sys
          d = json.load(open("deposition.json"))
          files = d.get("files", [])
          if files:
              print("Found existing files in draft (copied from previous version):")
              for f in files:
                  print(f["id"], f["filename"])
          else:
              print("No existing files in draft.")
          PY

          # Delete any existing files in the draft (copied from previous version)
          FILE_IDS=$(python - <<'PY'
          import json
          d=json.load(open("deposition.json"))
          for f in d.get("files", []):
              print(f["id"])
          PY
          )

          for fid in $FILE_IDS; do
            echo "Deleting draft file id: $fid"
            curl -fsS -X DELETE "$API/deposit/depositions/$DEP_ID/files/$fid" \
              -H "Authorization: Bearer $ZENODO_ACCESS_TOKEN" >/dev/null
          done

          # Upload metadata from repo root .zenodo.json
          curl -fsS -X PUT "$API/deposit/depositions/$DEP_ID" \
            -H "Authorization: Bearer $ZENODO_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d @.zenodo.json >/dev/null

          # Upload artifacts (require at least one file in dist/)
          shopt -s nullglob
          files=(dist/*)
          if [ ${#files[@]} -eq 0 ]; then
            echo "ERROR: no files found in dist/ to upload"
            exit 1
          fi

          for f in "${files[@]}"; do
            echo "Uploading $(basename "$f")"
            curl -fsS -X PUT "$BUCKET/$(basename "$f")" \
              -H "Authorization: Bearer $ZENODO_ACCESS_TOKEN" \
              --upload-file "$f" >/dev/null
          done

          # Publish deposition (mints a new VERSION DOI under the SAME Concept DOI)
          curl -fsS -X POST "$API/deposit/depositions/$DEP_ID/actions/publish" \
            -H "Authorization: Bearer $ZENODO_ACCESS_TOKEN" >/dev/null

          echo "Zenodo published new version under existing concept record."
